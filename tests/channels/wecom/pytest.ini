# pytest配置文件

[tool.pytest.ini_options]
testpaths = [
    "tests/channels/wecom"
]
python_files = [
    "test_*.py",
    "*_test.py"
]
python_classes = [
    "Test*"
]
python_functions = [
    "test_*"
]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "requires_credentials: marks tests that require real API credentials"
]

# 异步测试配置
asyncio_mode = "auto"

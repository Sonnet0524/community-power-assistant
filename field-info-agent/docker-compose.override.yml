# =============================================================================
# Field Info Agent - Docker Compose 开发环境覆盖配置
# =============================================================================
# 本文件用于覆盖 docker-compose.yml 的默认配置，专门用于开发环境
# 
# 使用方式：
# - 开发环境直接运行: docker-compose up -d
# - Docker Compose 会自动读取此文件并覆盖主配置
#
# 注意：
# - 此文件不应用于生产环境
# - 生产环境应使用 docker-compose.prod.yml
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # PostgreSQL 开发环境配置
  # ===========================================================================
  postgres:
    # 开发环境暴露更多调试信息
    environment:
      # 启用详细日志
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - POSTGRES_USER=${POSTGRES_USER:-field_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-field_pass}
      - POSTGRES_DB=${POSTGRES_DB:-field_agent}
      - TZ=Asia/Shanghai
      - PGTZ=Asia/Shanghai
    # 开发环境挂载 SQL 文件以便热更新
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      # 可选：挂载 SQL 开发目录用于调试
      # - ./sql-dev:/sql-dev:ro
    # 开发环境降低健康检查频率，减少日志输出
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-field_user} -d ${POSTGRES_DB:-field_agent}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # MinIO 开发环境配置
  # ===========================================================================
  minio:
    # 开发环境简化配置
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_SERVER_URL=http://localhost:${MINIO_PORT:-9000}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:${MINIO_CONSOLE_PORT:-9001}
    # 开发环境挂载本地目录便于查看文件
    volumes:
      - minio_data:/data
      # 可选：挂载本地目录用于调试
      # - ./minio-dev:/minio-dev

  # ===========================================================================
  # Redis 开发环境配置
  # ===========================================================================
  redis:
    # 开发环境简化持久化策略
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
    # 开发环境降低健康检查频率
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redispass} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # 开发工具（可选）
  # ===========================================================================
  # 取消注释以下服务以启用开发工具

  # PostgreSQL 管理界面（pgAdmin）
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: field-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=admin@field.local
  #     - PGADMIN_DEFAULT_PASSWORD=admin
  #     - PGADMIN_CONFIG_SERVER_MODE=False
  #   ports:
  #     - "5050:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   networks:
  #     - field-network
  #   depends_on:
  #     - postgres
  #   profiles:
  #     - tools

  # Redis 管理界面（RedisInsight）
  # redisinsight:
  #   image: redis/redisinsight:latest
  #   container_name: field-redisinsight
  #   restart: unless-stopped
  #   ports:
  #     - "5540:5540"
  #   volumes:
  #     - redisinsight_data:/data
  #   networks:
  #     - field-network
  #   depends_on:
  #     - redis
  #   profiles:
  #     - tools

# -----------------------------------------------------------------------------
# 开发环境额外卷
# -----------------------------------------------------------------------------
volumes:
  # pgAdmin 数据卷（如果使用）
  # pgadmin_data:
  #   driver: local
  
  # RedisInsight 数据卷（如果使用）
  # redisinsight_data:
  #   driver: local
